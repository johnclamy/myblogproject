{% extends "blog/base.html" %}
{% block title %}
    {{ post.title }}
{% endblock title %}
{% block content %}
    <header class="post-header">
        <h2>{{ post.title }}</h2>
        <p class="post-date">Published {{ post.publish }} by {{ post.author }}</p>
    </header>
        {{ post.body|linebreaks }}
{% endblock content %}
